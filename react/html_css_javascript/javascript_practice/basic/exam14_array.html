<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- 배열 항목 읽기 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun1()">
      fun1() 호출
    </button>
    <script>
      function fun1() {
        const arr = ["java", "javascript", "react"];
        console.log(arr[1]);
        arr[1] = "spring";
        console.log(arr[1]);
        console.log("\n");

        // 반복1
        for (var i = 0; i < arr.length; i++) {
          console.log(arr[i]);
        }
        console.log("\n");

        //반복2
        for (var item of arr) {
          console.log(item);
        }
        console.log("\n");

        //반복3
        arr.forEach((item) => {
          console.log(item);
        });
      }
    </script>

    <hr />
    <!-- 배열 항목 추가 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun2()">
      fun2() 호출
    </button>
    <script>
      function fun2() {
        const arr = [];
        arr.push("java");
        arr.push("javascript");
        arr.push("react");
        console.log(arr.length, arr);
      }
    </script>

    <hr />
    <!-- 배열 항목 삭제 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun3()">
      fun3() 호출
    </button>
    <script>
      function fun3() {
        const arr = ["java", "javascript", "react", "MyBatis", "Oracle"];

        //항목 삭제
        //arr.splice(3, 1); //3번째 인덱스부터 1개 삭제
        arr.splice(3, 2); // 3번째 인덱스부터 2개 삭제
        console.log(arr);

        //항목 삽입
        // 인덱스 1번째에 삭제할건 없고, "Spring"을 삽입할게
        arr.splice(1, 0, "Spring");
        console.log(arr);
      }
    </script>
  </body>
</html>
