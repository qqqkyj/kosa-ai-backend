<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <!-- 배열 항목 읽기 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun1()">
      fun1() 호출
    </button>
    <script>
      function fun1() {
        const arr = ["java", "javascript", "react"];
        console.log(arr[1]);
        arr[1] = "spring";
        console.log(arr[1]);
        console.log("\n");

        // 반복1
        for (var i = 0; i < arr.length; i++) {
          console.log(arr[i]);
        }
        console.log("\n");

        //반복2
        for (var item of arr) {
          console.log(item);
        }
        console.log("\n");

        //반복3
        arr.forEach((item) => {
          console.log(item);
        });
      }
    </script>

    <hr />
    <!-- 배열 항목 추가 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun2()">
      fun2() 호출
    </button>
    <script>
      function fun2() {
        const arr = [];
        arr.push("java");
        arr.push("javascript");
        arr.push("react");
        console.log(arr.length, arr);
      }
    </script>

    <hr />
    <!-- 배열 항목 삭제 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun3()">
      fun3() 호출
    </button>
    <script>
      function fun3() {
        const arr = ["java", "javascript", "react", "MyBatis", "Oracle"];

        //항목 삭제
        //arr.splice(3, 1); //3번째 인덱스부터 1개 삭제
        arr.splice(3, 2); // 3번째 인덱스부터 2개 삭제
        console.log(arr);

        //항목 삽입
        // 인덱스 1번째에 삭제할건 없고, "Spring"을 삽입할게
        arr.splice(1, 0, "Spring");
        console.log(arr);
      }
    </script>

    <!-- 2026-04-24 -->
    <!-- 배열 결합하기 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun4()">
      fun4() 호출
    </button>
    <script>
      function fun4() {
        var arr1 = ["A", "B"];
        var arr2 = ["C", "D"];

        const arr3 = [...arr1, ...arr2];
        const arr4 = arr1.concat(arr2);

        console.log("arr3:", arr3);
        console.log("arr4:", arr4);
      }
    </script>

    <!-- 필터링하기 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun5()">
      fun5() 호출
    </button>
    <script>
      function fun5() {
        const arr1 = [1, 2, 3, 4, 5];
        const arr2 = arr1.filter((item) => item % 2 === 0);
        console.log("arr2:", arr2);
        console.log("arr1:", arr1);

        const arr3 = [
          { bno: 1, title: "제목1", writer: "홍길동" },
          { bno: 2, title: "제목2", writer: "홍길서" },
          { bno: 3, title: "제목3", writer: "홍길남" },
          { bno: 4, title: "제목4", writer: "홍길서" },
          { bno: 5, title: "제목5", writer: "홍길북" },
        ];

        const arr4 = arr3.filter((board) => board.writer === "홍길서");
        console.log(arr4);
      }
    </script>

    <!-- 요소 찾기 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun6()">
      fun6() 호출
    </button>
    <script>
      function fun6() {
        const arr1 = [
          { bno: 1, title: "제목1", writer: "홍길동" },
          { bno: 2, title: "제목2", writer: "홍길서" },
          { bno: 3, title: "제목3", writer: "홍길남" },
          { bno: 4, title: "제목4", writer: "홍길서" },
          { bno: 5, title: "제목5", writer: "홍길북" },
        ];

        const board = arr1.find((board) => board.bno === 3);
        console.log(board);
      }
    </script>

    <!-- 일괄 처리(전체 요소를 하나씩 처리) -->
    <button class="btn btn-info btn-sm m-2" onclick="fun7()">
      fun7() 호출
    </button>
    <script>
      function fun7() {
        const arr1 = [
          { bno: 1, title: "제목1", writer: "홍길동" },
          { bno: 2, title: "제목2", writer: "홍길서" },
          { bno: 3, title: "제목3", writer: "홍길남" },
          { bno: 4, title: "제목4", writer: "홍길서" },
          { bno: 5, title: "제목5", writer: "홍길북" },
        ];

        for (var i = 0; i < arr1.length; i++) {
          console.log(arr1[i]);
        }

        console.log("\n");
        for (var board of arr1) {
          console.log(board);
        }

        console.log("\n");
        arr1.forEach((board) => console.log(board));
      }
    </script>

    <!-- 요소 변환(A -> B) -->
    <button class="btn btn-info btn-sm m-2" onclick="fun8()">
      fun8() 호출
    </button>
    <script>
      function fun8() {
        const arr1 = [1, 2, 3, 4, 5];
        const arr2 = arr1.map((item) => item * 10);
        console.log(arr2);

        const arr3 = [
          { bno: 1, title: "제목1", writer: "홍길동" },
          { bno: 2, title: "제목2", writer: "홍길서" },
          { bno: 3, title: "제목3", writer: "홍길남" },
          { bno: 4, title: "제목4", writer: "홍길서" },
          { bno: 5, title: "제목5", writer: "홍길북" },
        ];

        const arr4 = arr3.map((board) => ({
          ...board,
          writer: "홍길동",
          data: new Date().toLocaleDateString(),
        }));
        console.log(arr4);
      }
    </script>

    <!-- 요소 정렬하기 -->
    <button class="btn btn-info btn-sm m-2" onclick="fun9()">
      fun9() 호출
    </button>
    <script>
      function fun9() {
        const arr1 = ["Banana", "Orange", "Apple", "Mango"];
        arr1.sort(); //오름차순(ASC)
        console.log(arr1);

        arr1.reverse(); //내림차순(DESC)
        console.log(arr1);

        console.log("\n");
        const arr2 = [
          { bno: 1, title: "제목1", writer: "홍길동" },
          { bno: 2, title: "제목2", writer: "홍길서" },
          { bno: 3, title: "제목3", writer: "홍길남" },
          { bno: 4, title: "제목4", writer: "홍길서" },
          { bno: 5, title: "제목5", writer: "홍길북" },
        ];

        //오름차순(ASC)
        const arr3 = arr2.sort((board1, board2) => board1.bno - board2.bno);
        console.log(arr3);

        //내림차순(DESC)
        const arr4 = arr2.sort((board1, board2) => board2.bno - board1.bno);
        console.log(arr4);
      }
    </script>
  </body>
</html>
