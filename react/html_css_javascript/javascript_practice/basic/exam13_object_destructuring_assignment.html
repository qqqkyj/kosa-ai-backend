<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>

    <script>
      function fun1() {
        const board = {
          title: "오늘은 목요일",
          content: "오늘은 자바스크립트를 학습해요, 너무 좋아요.",
          writer: "홍길동",
        };

        //객체 구조 분해 할당
        //var title = board.title;
        var { title } = board;
        console.log(title);

        var { title, content } = board;
        console.log(title);
        console.log(content);
      }

      const fun2 = () => {
        const board = {
          title: "오늘은 목요일",
          content: "오늘은 자바스크립트를 학습해요, 너무 좋아요.",
          writer: "홍길동",
        };

        var { title, ...rest } = board;
        console.log(title);
        console.log(rest);
      };

      const fun3 = function () {
        const board = {
          title: "오늘은 목요일",
          content: "오늘은 자바스크립트를 학습해요, 너무 좋아요.",
          writer: "홍길동",
        };

        //board.bno = 1; // 기존 객체에 bno를 추가
        const newBoard = { ...board, bno: 1, content: "아니 싫어요." }; // 완전히 새로운 객체를 생성
        console.log(board);
        console.log(newBoard);
      };
    </script>
  </head>
  <body>
    <button class="btn btn-info btn-sm m-2" onclick="fun1()">
      fun1() 호출
    </button>
    <button class="btn btn-info btn-sm m-2" onclick="fun2()">
      fun2() 호출
    </button>
    <button class="btn btn-info btn-sm m-2" onclick="fun3()">
      fun3() 호출
    </button>
  </body>
</html>
