<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <script>
      function checkData() {
        const mid = document.querySelector("#mid").value;
        const mpassword = document.querySelector("#mpassword").value;
        const memail = document.querySelector("#memail").value;

        console.log("mid:", mid);
        console.log("mpassword:", mpassword);
        console.log("memail:", memail);

        //mid의 규칙: 최소:5, 최대:15, 알파벳, 숫자
        const midRegExp = /^(?=.*[A-Za-z])(?=.*\d)[A-Za-z\d]{5,15}$/;
        if (midRegExp.test(mid)) {
          console.log("사용가능한 id입니다.");
        } else {
          console.log("사용이 불가능한 id입니다.");
        }

        //mpassword 규칙: 최소:8, 최대:20, 대소문자 혼용, 특수문자 1개 이상, 한글 안됨
        const mpasswordRegExp =
          /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?])[A-Za-z\d!@#$%^&*()_+\-=\[\]{};':"\\|,.<>\/?]{8,20}$/;
        if (mpasswordRegExp.test(mpassword)) {
          console.log("올바른 mpassword입니다.");
        } else {
          console.log("올바르지 않은 mpassword입니다.");
        }

        //memail 규칙: 이메일 형식
        const memailRegExp = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (memailRegExp.test(memail)) {
          console.log("올바른 이메일 형식입니다.");
        } else {
          console.log("올바르지 않은 이메일 형식입니다.");
        }
      }
    </script>
  </head>
  <body>
    <div class="card m-3">
      <div class="card-header">정규 표현식(유효성 검사)</div>
      <div class="card-body">
        <div class="mb-3">
          <!-- for를 설정함에 따라 label을 선택하면 해당 input에 focus가 감 -->
          <label for="mid" class="form-label">아이디</label>
          <input
            type="text"
            class="form-control"
            id="mid"
            placeholder=" 회원 아이디"
          />
        </div>
        <div class="mb-3">
          <label for="mpassword" class="form-label">비밀번호</label>
          <input type="password" class="form-control" id="mpassword" />
        </div>
        <div class="mb-3">
          <label for="memail" class="form-label">이메일</label>
          <input type="email" class="form-control" id="memail" />
        </div>
        <div class="text-center">
          <button class="btn btn-outline-info btn-sm" onclick="checkData()">
            등록
          </button>
        </div>
      </div>
    </div>
  </body>
</html>
