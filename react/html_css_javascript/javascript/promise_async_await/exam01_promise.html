<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script>
        function task() {
            return new Promise((resolve, reject) => {
                //비동기 작업 처리(시간이 필요한 작업)
                const result = true;
                if(result) {
                    resolve();
                } else {
                    reject();
                }
            });
        }

        function work1() {
            task()
                .then(() => {
                    console.log("성공 처리됨");
                })
                .catch(() => {
                    console.log("실패 처리됨");
                })
                .finally(() => {
                    console.log("마무리 작업");
                });
        }

        function work2() {
            task().then(
                () => {
                    console.log("성공 처리됨");
                },
                () => {
                    console.log("실패 처리됨");
                }
            );
        }

        async function work3() {
            try {
                await task();
                console.log("성공 처리됨");
            } catch(err) {
                console.log("실패 처리됨");
            }
        }

        function work4() {
            console.log("A");
            work3();
            console.log("B");
        }

        function work5() {
            console.log("A");
            const work = async () => {
                try {
                    await task();
                    console.log("성공 처리됨");
                } catch(err) {
                    console.log("실패 처리됨");
                }
            };
            work();
            console.log("B");
        }
    </script>
</head>
<body>
    <button onclick="work1()">비동기 작업 처리1</button>
    <button onclick="work2()">비동기 작업 처리2</button>
    <button onclick="work3()">비동기 작업 처리3</button>
    <button onclick="work4()">비동기 작업 처리4</button>
    <button onclick="work5()">비동기 작업 처리5</button>
</body>
</html>
