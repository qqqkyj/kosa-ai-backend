<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fun1();
        });

        const fun1 = async () => {
            try {
                const response = await fetch("exam03_1_data.json");
                const data = await response.json();
                document.getElementById("pageNo").textContent = data.pageNo;
                const imagesDiv = document.getElementById("imagesDiv");
                imagesDiv.innerHTML = '';
                data.images.forEach((obj) => {
                    var imgTag = "<img ";
                    imgTag = imgTag + " src='" + obj.src + "'"; 
                    imgTag = imgTag + " width='" + obj.width + "'";
                    imgTag = imgTag + " height='" + obj.height + "'";
                    imgTag = imgTag + "/>";
                    imagesDiv.innerHTML += imgTag;
                });
            } catch (err) {
                console.log(err);
            }
        };

        const fun2 = async () => {
            try {
                const response = await fetch("exam03_2_data.json");
                const data = await response.json();
                document.getElementById("pageNo").textContent = data.pageNo;
                const imagesDiv = document.getElementById("imagesDiv");
                imagesDiv.innerHTML = '';
                data.images.forEach((obj) => {
                    var imgTag = "<img ";
                    imgTag = imgTag + " src='" + obj.src + "'"; 
                    imgTag = imgTag + " width='" + obj.width + "'";
                    imgTag = imgTag + " height='" + obj.height + "'";
                    imgTag = imgTag + "/>";
                    imagesDiv.innerHTML += imgTag;
                });
            } catch (err) {
                console.log(err);
            }
        };
    </script>
</head>
<body>
    <button onclick="fun2()">비동기 요청</button>
    <hr/>
    <div id="content">
        <p>PageNo: <span id="pageNo"></span></p>
        <div id="imagesDiv">
        </div>
    </div>
</body>
</html>
