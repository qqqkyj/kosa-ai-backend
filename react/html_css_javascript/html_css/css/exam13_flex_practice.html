<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>Flex Layout</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
      }

      .container {
        border: 5px solid red;
      }

      .header {
        border: 5px solid green;
        height: 150px;
      }

      .main {
        display: flex;
        border: 5px solid blue;
        gap: 10px;
        padding: 10px;
      }

      /* 왼쪽 */
      .left {
        flex: 3;
        display: flex;
        flex-direction: column; /* 핵심 */
        gap: 10px;
      }

      .left-top {
        border: 5px solid yellow;
        height: 120px; /* 광고 영역 */
      }

      .left-bottom {
        border: 5px solid yellow;
        flex: 1; /* 남은 영역 다 차지 */
        min-height: 200px;
      }

      /* 오른쪽 */
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .box {
        border: 5px solid yellow;
        flex: 1;
      }

      .banner {
        border: 5px solid green;
        height: 120px;
      }

      .footer {
        border: 5px solid green;
        height: 150px;
      }

      img {
        width: 100%;
      }
    </style>
  </head>

  <body>
    <div class="container">
      <div class="header">
        <img src="/images/layout/2026-04-22_15-13-45.png" />
      </div>

      <div class="main">
        <!-- 왼쪽 -->
        <div class="left">
          <div class="left-top">
            <img src="/images/layout/2026-04-22_15-14-45.png" />
          </div>
          <div class="left-bottom">
            <img src="/images/layout/2026-04-22_15-16-10.png" />
          </div>
        </div>

        <!-- 오른쪽 -->
        <div class="right">
          <div class="box">
            <img src="/images/layout/2026-04-22_15-16-28.png" />
          </div>
          <div class="box">
            <img src="/images/layout/2026-04-22_15-16-43.png" />
          </div>
          <div class="box">
            <img src="/images/layout/2026-04-22_15-17-41.png" />
          </div>
        </div>
      </div>

      <div class="banner">
        <img src="/images/layout/2026-04-22_15-18-42.png" />
      </div>
      <div class="footer">
        <img src="/images/layout/2026-04-22_15-19-00.png" />
      </div>
    </div>
  </body>
</html>
