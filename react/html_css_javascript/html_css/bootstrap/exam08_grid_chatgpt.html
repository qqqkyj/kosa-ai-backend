<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Layout</title>

    <!-- Bootstrap 5.3.8 -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      .header,
      .footer {
        background: #000;
        color: #fff;
        text-align: center;
        padding: 20px 0;
      }

      .sidebar {
        background: #9ad7e8;
        min-height: 300px;
      }

      .content {
        background: #ffffff;
        min-height: 300px;
      }
    </style>
  </head>

  <body>
    <!-- Header -->
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 header">Cities</div>
      </div>
    </div>

    <!-- Main -->
    <div class="container-fluid">
      <div class="row">
        <!-- Left (Blue area) -->
        <aside class="col-12 col-md-4 sidebar">
          <ul>
            <li>test1</li>
          </ul>
        </aside>

        <!-- Right (White area) -->
        <main class="col-12 col-md-8 content"></main>
      </div>
    </div>

    <!-- Footer -->
    <div class="container-fluid">
      <div class="row">
        <div class="col-12 footer">Footer</div>
      </div>
    </div>
  </body>
</html>
