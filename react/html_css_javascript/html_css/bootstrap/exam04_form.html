<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="card m-3">
      <div class="card-header">BoardWriteForm Component</div>
      <div class="card-body">
        <div class="mb-3">
          <!-- for를 설정함에 따라 label을 선택하면 해당 input에 focus가 감 -->
          <label for="btitle" class="form-label">제목</label>
          <input
            type="text"
            class="form-control"
            id="btitle"
            placeholder=" 게시물 제목 입력"
          />
        </div>
        <div class="mb-3">
          <label for="bcontent" class="form-label">내용</label>
          <textarea
            class="form-control"
            id="bcontent"
            rows="5"
            placeholder=" 게시물 내용을 입력해 주세요...."
          ></textarea>
        </div>
        <div class="mb-3">
          <label for="battach" class="form-label">첨부 파일</label>
          <input class="form-control" type="file" id="battach" />
        </div>
        <div class="text-center">
          <button class="btn btn-outline-info btn-sm">등록</button>
          <button class="btn btn-outline-danger btn-sm">취소</button>
        </div>
      </div>
    </div>
  </body>
</html>
